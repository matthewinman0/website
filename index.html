<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Matthew Inman — developer. Projects and open source work." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>" />
    <title>Matthew Inman</title>
  </head>
  <body>
    <div class="wrapper">

      <header>
        <div class="header-inner">
          <h1 class="site-name">Matthew <em>Inman</em></h1>
          <div class="Search">
            <input type="text" placeholder="Search.." id="Search">
          </div>
          <span class="header-meta">Built it because I could</span>
        </div>
      </header>

      <main>
        <section aria-label="WebApps">
          <div class="section-header">
            <h2 class="section-title">Web Apps</h2>
            <span id="app-count"></span>
          </div>
          <div id="app-grid" role="list" aria-live="polite"></div>
        </section>

        <section aria-label="Projects">
          <div class="section-header">
            <h2 class="section-title">Projects</h2>
            <span id="project-count"></span>
          </div>
          <div id="projects-grid" role="list" aria-live="polite"></div>
        </section>
      </main>

      <footer>
        <div class="footer-inner">
          <a href="https://github.com/matthewinman0" target="_blank" rel="noopener">GitHub ↗</a>
          <span class="footer-copy">© 2025 Matthew Inman</span>
        </div>
      </footer>

    </div>
    <script type="module" src="/src/react-app/main.ts"></script>
  </body>
</html>
