<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Open-Street O-Map</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }

  #toggle3d {
    position: absolute;
    z-index: 1;
    top: 110px;
    right: 10px;
    padding: 6px;
    font-weight: 600;
    background: white;
    border: none;
    border-radius: 4px;
    box-shadow: 0 0 0 2px rgba(0,0,0,.1);
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="map"></div>
<button id="toggle3d">3D</button>

<script>
let is3D = true;

const map = new maplibregl.Map({
  container: "map",
  style: "/apps/mapgen/style.json",
  center: [-3.9642, 56.1884],
  zoom: 14
});

// ✅ toggle logic
function updateButton() {
  document.getElementById("toggle3d").innerText = is3D ? "3D" : "2D";
}

function toggleBuildings() {
  is3D = !is3D;

  map.setLayoutProperty(
    "buildings-3d",
    "visibility",
    is3D ? "visible" : "none"
  );

  map.setLayoutProperty(
    "buildings-2d",
    "visibility",
    is3D ? "none" : "visible"
  );

  updateButton();
}

// attach click
document.getElementById("toggle3d").onclick = toggleBuildings;

// initial label
updateButton();

map.on("load", () => {

  map.addControl(new maplibregl.NavigationControl());

});
</script>

</body>
</html>
